# Pipeline configuration for FM_ice.
# Defaults are conservative and meant to be overridden per experiment.

paths:
  data_root: "data"
  raw: "data/raw"            # downloaded images, stage, temperature, ice flags
  interim: "data/interim"    # aligned clips, manifests
  processed: "data/processed"
  cache: "data/cache"        # cached embeddings (the expensive artifact)
  results: "results"

# --- Clip definition -------------------------------------------------------
# Cadence is hourly (see configs/stations.yaml finding #1). A "clip" is a fixed
# window of consecutive hourly frames. Pick ONE policy and keep it fixed across
# the whole study, because the V-JEPA checkpoint expects a fixed frame count.
clip:
  frames: 16                 # number of hourly frames per clip
  stride_hours: 4            # hop between clip start times (overlap allowed)
  span_hours: 16             # frames * interval; recorded for clarity
  min_valid_frames: 12       # drop a clip if fewer REAL frames are present (temporal
                             # continuity gate). QC usability is recorded per clip as
                             # valid_fraction but is NOT a drop criterion: the H3 /
                             # GATE A lighting-split analysis needs night & glare clips.
  resize: 256                # square resize fed to the encoder

# --- Foundation-model encoders --------------------------------------------
encoders:
  vjepa2:
    hf_id: "facebook/vjepa2-vitl-fpc64-256"   # ViT-L, 64 frames/clip, 256px
    pooling: attentive        # attentive | mean ; attentive is much stronger
    note: "vitg-fpc64-256 is the larger option. V-JEPA 2.1 (2026-03) is torch.hub only."
  dinov2:                     # image-FM ablation (H2). Per-frame, then pooled.
    hf_id: "facebook/dinov2-large"
    pooling: mean

# --- Temporal head ---------------------------------------------------------
temporal_head:
  type: tcn                  # tcn | transformer
  hidden: 256
  layers: 4
  dropout: 0.1
  use_air_temp: true         # concatenate hourly temperature per step
  smoothing_loss_weight: 0.15   # MS-TCN style anti-flicker penalty

# --- RIce-Net reproduction baseline (Ayyad et al. 2025) --------------------
# The anchor this project must beat. Params verified against
# github.com/m-ayyad/RIce-Net utils/config.py (MIT code) and the HydroShare
# release (CC BY 4.0, DOI 10.4211/hs.ff4e9c4e87ef4d7d923efe77f5ed2b83).
# NOTE: model input is 1152x640 (NOT the 256 the encoder uses); 2 classes
# ['Open Water','Ice Presence'] with ice = index 1; the saved .pth is a pickled
# full model object (load with weights_only=False; smp must be importable).
ricenet:
  weights_dir: "data/external/ricenet"
  segmentation_weights: "segmentation_model.pth"      # ~93 MB
  classification_weights: "classification_model.pth"   # ~90 MB (ice/no-ice gate)
  hydroshare_id: "ff4e9c4e87ef4d7d923efe77f5ed2b83"
  input_width: 1152
  input_height: 640
  mean: [0.485, 0.456, 0.406]    # ImageNet
  std:  [0.229, 0.224, 0.225]
  ice_class_index: 1
  # The official pipeline optionally zeros IC when a separate classifier says
  # 'no ice'. That gate is NOT wired here (the classifier's exact preprocessing is
  # unverified), so IC comes from the segmenter alone. Set true only after wiring
  # the classifier in segment_ice_coverage; run() refuses to proceed otherwise.
  use_classifier_gate: false
  onset_tau: 15.0                # NOTE: tau/persistence are this repo's choice (paper paywalled)
  breakup_tau: 20.0
  persist_hours: 8

# --- Change-point baselines (label-free) -----------------------------------
changepoint:
  bocpd:
    hazard_lambda: 240       # expected segment length in hours (~10 days)
    alarm_alpha: 0.5
  beast:
    season_period: 0         # 0 = no seasonality within a single winter

# --- Event reading / evaluation -------------------------------------------
events:
  ice_state_threshold: 0.5
  min_event_separation_hours: 48
  # Physical freezing guard (Phase 3): a sustained ice run only counts if its mean
  # air temperature is at/below this (deg C). Rejects warm-season appearance
  # false-positives (e.g. a November confound) without touching real winter ice.
  # A domain prior at the freezing point, NOT tuned to the held-out winter.
  onset_freeze_guard_c: 0.0
evaluation:
  tolerance_hours: [24, 48, 72]   # event F1 tolerance windows
  references: ["usgs_ice_flag", "stage_breakpoint"]

seed: 1337
